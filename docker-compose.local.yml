# HermesFlow 本地开发环境 docker-compose
# 启动命令：docker-compose -f docker-compose.local.yml up -d
# 仅包含基础设施与前端服务，便于测试deploy脚本

services:
  postgres:
    image: postgres:15
    container_name: hermesflow_postgres
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes123
      POSTGRES_DB: hermesflow
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hermesflow

  redis:
    image: redis:7
    container_name: hermesflow_redis
    ports:
      - "16379:6379"
    networks:
      - hermesflow

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: hermesflow_zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    networks:
      - hermesflow

  kafka:
    image: bitnami/kafka:latest
    container_name: hermesflow_kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:19092
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "19092:9092"
    depends_on:
      - zookeeper
    networks:
      - hermesflow

  clickhouse:
    image: yandex/clickhouse-server:21.3
    container_name: hermesflow_clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - hermesflow

  nacos:
    image: nacos/nacos-server:latest
    container_name: hermesflow_nacos
    environment:
      - MODE=standalone
    ports:
      - "18848:8848"
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - hermesflow

  gateway:
    build: ./services/gateway
    container_name: hermesflow_gateway
    ports:
      - "18020:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      - nacos
    networks:
      - hermesflow

  api-gateway:
    build: ./services/api-gateway
    container_name: hermesflow_api_gateway
    ports:
      - "18021:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      - nacos
    networks:
      - hermesflow

  frontend:
    build: ./frontend
    container_name: hermesflow_frontend
    ports:
      - "3000:80"
    networks:
      - hermesflow

networks:
  hermesflow:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  nacos_data: 