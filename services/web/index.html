<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HermesFlow - 量化交易终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              hermes: {
                50: '#e6fffa',
                100: '#b3ffd9',
                200: '#80ffc0',
                300: '#4dffaa',
                400: '#26ff99',
                500: '#00E396', // Pro Trading Green (Clearer)
                600: '#00cc88',
                700: '#00a36d',
                800: '#007a52',
                900: '#005236',
              },
              // Professional Neutral Dark Palette (Zinc/Slate based)
              surface: {
                50:  '#f4f4f5',
                100: '#e4e4e7',
                200: '#d4d4d8',
                300: '#a1a1aa',
                400: '#71717a',
                500: '#52525b',
                600: '#3f3f46', // Hover states
                700: '#27272a', // Borders / Separators
                800: '#18181b', // Cards / Panels
                900: '#121214', // Secondary BG
                950: '#09090b', // Main App BG
              },
              trade: {
                up: '#00E396',   // Green
                down: '#FF4560', // Red
                warn: '#FEB019', // Yellow
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #09090b;
        color: #e4e4e7;
      }
      /* Professional Thin Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        font-size: 20px;
      }
      .icon-filled {
        font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 20;
      }
      /* Tighten text rendering for high density */
      * {
        letter-spacing: -0.015em;
      }
      .text-shadow-glow {
        text-shadow: 0 0 10px rgba(0, 227, 150, 0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-surface-950 text-slate-200 font-sans antialiased overflow-hidden selection:bg-hermes-500/30 selection:text-hermes-500">
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
