spring:
  application:
    name: user-management-service-test
  
  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # H2 Console (仅测试环境)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Redis配置 (嵌入式Redis)
  data:
    redis:
      host: localhost
      port: 6370  # 测试专用端口
      password: 
      database: 1
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 2
          min-idle: 1
          max-wait: 2000ms
  
  # 安全配置
  security:
    user:
      name: test-admin
      password: test123
      roles: ADMIN

# JWT测试配置
jwt:
  secret: test-jwt-secret-key-for-unit-testing-only-not-for-production-use-must-be-at-least-256-bits-long-to-meet-security-requirements
  access-token-expiration: 300000   # 5分钟 (测试用短时间)
  refresh-token-expiration: 600000  # 10分钟 (测试用短时间)
  issuer: hermesflow-test

# 多租户测试配置
tenant:
  default-plan: BASIC
  max-users-per-tenant: 10
  session-timeout: 3600000  # 1小时

# 密码策略测试配置
password:
  min-length: 6  # 测试用较短密码
  require-uppercase: false
  require-lowercase: false
  require-digit: false
  require-special-char: false
  max-failed-attempts: 3
  lockout-duration: 60000  # 1分钟

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.hermesflow: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.test: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n"

# API文档配置
springdoc:
  api-docs:
    enabled: false  # 测试环境禁用
  swagger-ui:
    enabled: false  # 测试环境禁用 