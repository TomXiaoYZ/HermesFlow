server:
  port: 18010
  servlet:
    context-path: /api/v1

spring:
  application:
    name: user-management-service
  
  profiles:
    active: local
  
  datasource:
    url: jdbc:postgresql://localhost:15432/hermesflow
    username: hermesflow
    password: hermesflow_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: localhost
      port: 16379
      password: hermesflow_redis_password
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
  
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# JWT配置
jwt:
  secret: hermesflow-jwt-secret-key-2024-very-long-and-secure-key-for-production
  access-token-expiration: 3600000  # 1小时
  refresh-token-expiration: 604800000  # 7天
  issuer: hermesflow-user-management

# 多租户配置
tenant:
  default-plan: BASIC
  max-users-per-tenant: 100
  session-timeout: 86400000  # 24小时

# 密码策略配置
password:
  min-length: 8
  require-uppercase: true
  require-lowercase: true
  require-digit: true
  require-special-char: true
  max-failed-attempts: 5
  lockout-duration: 900000  # 15分钟

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    com.hermesflow: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n"
  file:
    name: logs/user-management.log

# API文档配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: HermesFlow User Management API
    description: 多租户用户管理服务API文档
    version: 1.0.0
    contact:
      name: HermesFlow Team
      email: support@hermesflow.com

---
# Docker环境配置
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/hermesflow
  data:
    redis:
      host: redis

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: production
  jpa:
    show-sql: false
  logging:
    level:
      com.hermesflow: INFO
      org.springframework.security: WARN
      org.hibernate.SQL: WARN 