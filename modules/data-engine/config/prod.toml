# Production environment configuration
# Note: Sensitive values should be provided via environment variables

[server]
host = "0.0.0.0"
port = 8080
shutdown_timeout_secs = 60

[redis]
# Override with: DATA_ENGINE__REDIS__URL
url = "redis://redis-service:6379"
pool_size = 20
ttl_secs = 86400

[clickhouse]
# Override with: DATA_ENGINE__CLICKHOUSE__URL
url = "tcp://clickhouse-service:9000"
database = "hermesflow"
# Override with environment variables:
# DATA_ENGINE__CLICKHOUSE__USERNAME
# DATA_ENGINE__CLICKHOUSE__PASSWORD
username = "default"
password = ""
batch_size = 5000
flush_interval_ms = 3000

[performance]
channel_buffer_size = 50000
max_reconnect_attempts = 10
reconnect_delay_secs = 5
health_check_interval_secs = 10

[logging]
level = "info"
format = "json"
output = "stdout"






