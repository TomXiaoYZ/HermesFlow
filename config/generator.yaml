# Strategy Generator — multi-exchange configuration
# Each entry spawns an independent evolution loop within the same process.

exchanges:
  - exchange: Polygon
    resolution: "1h"
    lookback_days: 730
    factor_config: "config/factors-stock.yaml"
    # P3: Multi-timeframe factor stacking
    # Computes 25 factors per resolution, stacks to 75 features (feat_offset=75).
    # Set enabled: false to revert to P2 single-resolution mode (25 features).
    multi_timeframe:
      enabled: true
      resolutions: ["1h", "4h", "1d"]
      # P6-1A: Publication delay per resolution (seconds).
      # A bar's data is not available until bar_close_timestamp + publication_delay.
      # Prevents look-ahead bias when aligning lower-frequency bars to higher-frequency.
      # Example: a 1d bar closing at 16:00 ET has ~900s delay (available ~16:15 ET).
      publication_delays:
        "1h": 0
        "4h": 300
        "1d": 900
    walk_forward:
      initial_train: 2500
      target_test_window: 1000
      min_test_window: 400
      target_steps: 3

# P4: Adaptive threshold tuning
# Controls percentile-based thresholds and clamp ranges for position entry signals.
# Per-symbol overrides allow fine-tuning for symbols with known asymmetry.
threshold_config:
  # Global defaults (used when no per-symbol override exists)
  long_only:
    percentile_upper: 70         # percentile for upper threshold
    clamp_upper: [0.52, 0.80]   # relaxed from [0.52, 0.70] — NVDA was hitting 0.70 clamp
  long_short:
    percentile_upper: 70
    percentile_lower: 30
    clamp_upper: [0.1, 2.0]
    clamp_lower: [-2.0, -0.1]

  # Per-symbol overrides (optional)
  overrides:
    NVDA:
      long_only:
        clamp_upper: [0.52, 0.85]   # NVDA hits 0.70 clamp 18.8% of time
    QQQ:
      long_short:
        percentile_upper: 65         # QQQ has asymmetric distribution
        percentile_lower: 35

# P5: Portfolio Ensemble & HRP Allocation
# Runs a periodic rebalance loop that selects top strategies per exchange,
# computes HRP weights, applies dynamic adjustments, and tracks shadow equity.
ensemble:
  enabled: true
  min_oos_psr: 0.5
  min_wf_steps: 2
  min_utilization: 0.10
  max_strategies_per_symbol: 1
  max_total_strategies: 20
  correlation_lookback_bars: 500
  rebalance_interval_minutes: 30
  # P6a-F1: Covariance method for HRP allocation.
  # Options: { method: "sample" } or { method: "ewma", lambda: 0.94 }
  covariance_method:
    method: "ewma"
    lambda: 0.94
  # P6a-F2: Turnover cost rate per exchange (fraction of portfolio value).
  turnover_cost_rate: 0.0001  # 1 bps for Polygon/IBKR
  # P6b-F3: Regime-aware rebalancing.
  # Adjusts rebalance frequency based on annualized portfolio volatility.
  regime_aware: true
  regime_thresholds: [0.15, 0.30]  # annualized vol boundaries [low_upper, normal_upper]
  regime_intervals: [240, 60, 15]  # rebalance interval in minutes [low, normal, high]
  # P6b-C1: Deadzone + L1 regularization for turnover suppression.
  # Suppresses small weight changes and shrinks deltas toward zero.
  deadzone:
    enabled: true
    threshold: 0.02       # suppress weight changes below 2%
    l1_lambda: 0.01       # shrink weight deltas by 1%
    vol_adaptive: true    # scale lambda by volatility regime
  dynamic_weights:
    psr_reward_scale: 0.2
    psr_max_reward: 3.0
    utilization_floor: 0.3
    crowding_corr_threshold: 0.7
    crowding_penalty_rate: 0.3
    crowding_max_penalty: 0.8

# P6a-E2: VM protection penalty threshold.
# Genomes where >15% of ops trigger NaN/Inf sanitization get fitness penalized.
vm:
  protection_penalty_threshold: 0.15

# P6-1B: Local FDR hypothesis testing with RPN structural clustering.
# Disabled by default; enable when scaling beyond ~50 symbols.
lfdr:
  enabled: false
  fdr_level: 0.10
  ngram_size: 3
  min_cluster_size: 10
  jaccard_threshold: 0.3

# P6-4A: MCTS symbolic regression
# Monte Carlo Tree Search for discovering high-fitness RPN formulas.
# Injects top seeds into ALPS Layer 0 at configurable intervals.
mcts:
  enabled: false
  budget: 1000
  seeds_per_round: 5
  interval: 50
  exploration_c: 1.414
  max_length: 20
  use_max_reward: false

# P8-0: LLM-guided MCTS prior
# Transforms blind MCTS exploration into semantically guided search
# by biasing action selection toward factors identified as important.
llm_mcts_prior:
  enabled: true
  importance_recompute_interval: 500  # Gens between importance recalculation
  importance_boost_scale: 0.5         # Weight boost per unit of PSR drop
  operator_boost_scale: 0.2           # Weight boost for elite-observed operators
  min_importance_threshold: 0.05      # Skip factors below this PSR drop

# P8-2: Diversity-triggered emergency injection
# Converts passive Hamming diversity logging into active intervention
# when high-age ALPS layers converge excessively (stagnation signal).
diversity_trigger:
  enabled: true
  min_diversity_l3: 0.25       # L3 (age 89) threshold
  min_diversity_l4: 0.20       # L4 (age 500) threshold
  cooldown_gens: 100           # Min gens between emergency injections
  random_injection_count: 10   # Extra random genomes injected into L0 on trigger
  elitist_cull_ratio: 0.10     # Fraction of L0 weakest to cull on trigger

# LLM-guided mutation oracle (P2)
# Invoked when GA stalls (promotion rate drop or high TFT rate).
# Generates semantically meaningful formulas via LLM, injects into Layer 0.
llm_oracle:
  enabled: true
  provider: "bedrock"
  model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  region: "us-east-1"
  genomes_per_invocation: 10
  max_response_tokens: 1024
  # Trigger thresholds
  min_generation: 100
  promotion_rate_threshold: 0.70
  tft_rate_threshold: 0.40
  tft_min_generation: 200
  # Cooldown
  cooldown_gens: 50
  cooldown_seconds: 600
