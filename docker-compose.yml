services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_PASSWORD=hermesflow
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /Users/tomxiao/Desktop/HermesFlow-Data/clickhouse/data:/var/lib/clickhouse
      - /Users/tomxiao/Desktop/HermesFlow-Data/clickhouse/logs:/var/log/clickhouse-server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_connections=100"
    volumes:
      - hermesflow_postgres-data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector:
    image: timberio/vector:latest-alpine
    command: --config /etc/vector/vector.toml
    volumes:
      - ./infrastructure/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: always

  data-engine:
    build:
      context: .
      dockerfile: services/data-engine/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - RUST_ENV=prod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - DATA_ENGINE__REDIS__URL=redis://redis:6379
      - DATA_ENGINE__POSTGRES__HOST=timescaledb
      - DATA_ENGINE__POSTGRES__PASSWORD=password
      - DATA_ENGINE__SERVER__HOST=0.0.0.0
      - DATA_ENGINE__BIRDEYE__API_KEY=${DATA_ENGINE__BIRDEYE__API_KEY}
      - DATA_ENGINE__HELIUS__API_KEY=${DATA_ENGINE__HELIUS__API_KEY}
      - DATA_ENGINE__JUPITER__API_KEY=${DATA_ENGINE__JUPITER__API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - POLYGON_RATE_LIMIT=${POLYGON_RATE_LIMIT}
      - POLYGON_WS_ENABLED=${POLYGON_WS_ENABLED}
      - DATA_ENGINE__MASSIVE__API_KEY=${POLYGON_API_KEY}
      - DATA_ENGINE__MASSIVE__ENABLED=true
      - DATA_ENGINE__MASSIVE__WS_URL=wss://delayed.polygon.io/stocks
      - HTTPS_PROXY=http://host.docker.internal:7897
      - ALL_PROXY=socks5://host.docker.internal:7897
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=hermesflow
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/hermesflow
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  strategy-engine:
    build:
      context: .
      dockerfile: services/strategy-engine/Dockerfile
    environment:
      - RUST_LOG=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/hermesflow
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  user-management:
    build:
      context: ./services/user-management
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://timescaledb:5432/hermesflow
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: accept
      READ_ONLY_API: "no"
      TWOFA_TIMEOUT_ACTION: restart
      EXISTING_SESSION_DETECTED_ACTION: primary
      TIME_ZONE: ${TIME_ZONE:-America/New_York}
      TZ: ${TIME_ZONE:-America/New_York}
    ports:
      - "127.0.0.1:4001:4003"   # Live API (host:4001 → container:4003)
      - "127.0.0.1:4002:4004"   # Paper API (host:4002 → container:4004)
      - "127.0.0.1:5900:5900"   # VNC (debug — connect to see Gateway GUI)
    volumes:
      - ib_gateway_settings:/home/ibgateway/Jts
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/4004' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  execution-engine:
    build:
      context: .
      dockerfile: services/execution-engine/Dockerfile
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/hermesflow
      - HTTPS_PROXY=http://host.docker.internal:7897
      - ALL_PROXY=socks5://host.docker.internal:7897
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
      - IBKR_HOST=${IBKR_HOST:-ib-gateway}
      - IBKR_PORT=${IBKR_PORT:-4004}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-1}
      - FUTU_BRIDGE_URL=http://futu-bridge:8088
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl --noproxy '*' -sf http://localhost:8083/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  futu-bridge:
    build:
      context: ./services/futu-bridge
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - FUTU_OPEND_HOST=${FUTU_OPEND_HOST:-host.docker.internal}
      - FUTU_OPEND_PORT=${FUTU_OPEND_PORT:-11111}
      - FUTU_TRD_ENV=${FUTU_TRD_ENV:-SIMULATE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  strategy-generator:
    build:
      context: .
      dockerfile: services/strategy-generator/Dockerfile
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/hermesflow
      - GENERATOR_CONFIG=config/generator.yaml
      - GENERATOR_API_PORT=8082
    ports:
      - "8082:8082"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_URL=http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Monitoring Stack ──────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.49.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      data-engine:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager-discord:
    image: benjojo/alertmanager-discord:latest
    environment:
      - DISCORD_WEBHOOK=${DISCORD_ALERT_WEBHOOK_URL}
    depends_on:
      alertmanager:
        condition: service_healthy
    restart: always

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-hermesflow}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./infrastructure/grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  hermesflow_postgres-data:
    external: true
  ib_gateway_settings:
  prometheus_data:
  grafana_data:
