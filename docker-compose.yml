version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_PASSWORD=hermesflow
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./infrastructure/database/clickhouse/data:/var/lib/clickhouse
      - ./infrastructure/database/clickhouse/logs:/var/log/clickhouse-server
    restart: always

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - hermesflow_postgres-data:/var/lib/postgresql/data
    restart: always

  vector:
    image: timberio/vector:latest-alpine
    command: --config /etc/vector/vector.toml
    volumes:
      - ./infrastructure/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - clickhouse
    restart: always

  data-engine:
    build:
      context: .
      dockerfile: services/data-engine/Dockerfile
    ports:
      - "8081:8080" # Remapped to avoid conflict
    environment:
      - RUST_ENV=prod
      - DATA_ENGINE__REDIS__URL=redis://redis:6379
      - DATA_ENGINE__POSTGRES__HOST=timescaledb
      - DATA_ENGINE__POSTGRES__PASSWORD=password
      - DATA_ENGINE__SERVER__HOST=0.0.0.0
      - DATA_ENGINE__BIRDEYE__API_KEY=${DATA_ENGINE__BIRDEYE__API_KEY}
      - DATA_ENGINE__HELIUS__API_KEY=${DATA_ENGINE__HELIUS__API_KEY}
      - DATA_ENGINE__JUPITER__API_KEY=${DATA_ENGINE__JUPITER__API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      # Add API keys here or in .env
    depends_on:
      - redis
      - timescaledb
    restart: always

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080" # Exposed for WebSocket
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=hermesflow
    depends_on:
      - redis
      - clickhouse
    restart: always

  strategy-engine:
    build:
      context: .
      dockerfile: services/strategy-engine/Dockerfile
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - data-engine
    restart: always

  user-management:
    build:
      context: ./services/user-management
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://timescaledb:5432/hermesflow
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
    depends_on:
      - timescaledb
    restart: always

  execution-engine:
    build:
      context: .
      dockerfile: services/execution-engine/Dockerfile
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - HTTPS_PROXY=http://host.docker.internal:7897
      - ALL_PROXY=socks5://host.docker.internal:7897
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
    depends_on:
      - redis
    restart: always

  strategy-generator:
    build:
      context: .
      dockerfile: services/strategy-generator/Dockerfile
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/hermesflow
    depends_on:
      - redis
      - timescaledb
    restart: always

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_URL=http://gateway:8080
    depends_on:
      - gateway
    restart: always

volumes:
  redis_data:
  hermesflow_postgres-data:
    external: true
