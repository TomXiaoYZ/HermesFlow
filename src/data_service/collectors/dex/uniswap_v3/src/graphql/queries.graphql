query GetPool($id: ID!) {
  pool(id: $id) {
    id
    token0 {
      id
      symbol
      name
      decimals
    }
    token1 {
      id
      symbol
      name
      decimals
    }
    feeTier
    liquidity
    sqrtPrice
    tick
    token0Price
    token1Price
    totalValueLockedUSD
    volumeUSD
  }
}

query GetRecentSwaps($poolId: ID!, $first: Int!) {
  swaps(
    first: $first
    orderBy: timestamp
    orderDirection: desc
    where: { pool: $poolId }
  ) {
    id
    timestamp
    sender
    recipient
    origin
    amount0
    amount1
    amountUSD
    sqrtPriceX96
    tick
    transaction {
      id
      blockNumber
    }
  }
}

query GetLiquidityDistribution($poolId: ID!, $tickLower: Int!, $tickUpper: Int!) {
  ticks(
    first: 1000
    where: {
      pool: $poolId
      tickIdx_gte: $tickLower
      tickIdx_lte: $tickUpper
    }
    orderBy: tickIdx
  ) {
    tickIdx
    liquidityGross
    liquidityNet
    price0
    price1
    volumeToken0
    volumeToken1
    volumeUSD
    untrackedVolumeUSD
    feesUSD
    collectedFeesToken0
    collectedFeesToken1
    collectedFeesUSD
    createdAtTimestamp
    createdAtBlockNumber
  }
} 