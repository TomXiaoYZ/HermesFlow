server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: user-management-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/hermesflow}
    username: ${SPRING_DATASOURCE_USERNAME:hermesflow}
    password: ${SPRING_DATASOURCE_PASSWORD:hermesflow_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:hermesflow_redis_password}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms

# JWT配置
jwt:
  secret: ${JWT_SECRET:hermesflow-jwt-secret-key-2024-very-long-and-secure-key-for-production}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}  # 1小时
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7天
  issuer: hermesflow-user-management

# 多租户配置
tenant:
  default-plan: BASIC
  max-users-per-tenant: 100
  session-timeout: 86400000  # 24小时

# 密码策略配置
password:
  min-length: 8
  require-uppercase: true
  require-lowercase: true
  require-digit: true
  require-special-char: true
  max-failed-attempts: 5
  lockout-duration: 900000  # 15分钟

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    com.hermesflow: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{tenantId}] %logger{36} - %msg%n"
  file:
    name: /app/logs/user-management.log

# API文档配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: HermesFlow User Management API
    description: 多租户用户管理服务API文档
    version: 1.0.0
    contact:
      name: HermesFlow Team
      email: support@hermesflow.com 