server:
  port: 8081
  servlet:
    context-path: /permission-management

spring:
  application:
    name: permission-management-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hermesflow_permission
    username: ${DB_USERNAME:hermesflow}
    password: ${DB_PASSWORD:hermesflow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  cache:
    type: redis
    redis:
      time-to-live: 600000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth/realms/hermesflow}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.hermesflow.permissionmanagement: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/permission-management.log
    max-size: 100MB
    max-history: 30

# Swagger/OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.hermesflow.permissionmanagement.controller

# 自定义配置
hermesflow:
  permission:
    # 权限缓存配置
    cache:
      enabled: true
      ttl: 600 # 10分钟
      max-size: 10000
    
    # 默认权限配置
    default-permissions:
      enabled: true
      auto-initialize: true
    
    # 安全配置
    security:
      jwt:
        enabled: true
        public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:jwt-public-key.pem}
      
      # 权限检查配置
      permission-check:
        enabled: true
        cache-enabled: true
        strict-mode: false
    
    # 审计配置
    audit:
      enabled: true
      retention-days: 90
    
    # 多租户配置
    multi-tenant:
      enabled: true
      tenant-resolver: header # header, jwt, database
      default-tenant-id: ${DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000000}

# 分布式锁配置
redisson:
  address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 1
  connection-pool-size: 10
  connection-minimum-idle-size: 5
  timeout: 3000
  retry-attempts: 3
  retry-interval: 1500 