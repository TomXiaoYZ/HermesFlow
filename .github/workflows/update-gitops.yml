name: Update GitOps Repository

on:
  workflow_run:
    workflows: 
      - "CI - Rust Services"
      - "CI - Java Services"
      - "CI - Python Services"
      - "CI - Frontend"
    types: [completed]
    branches: [main, develop]

jobs:
  update-gitops:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download artifacts from CI workflow
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Determine target environment and modules
        id: changes
        run: |
          # Extract branch name from workflow run
          BRANCH_REF="${{ github.event.workflow_run.head_branch }}"
          echo "Branch: $BRANCH_REF"
          
          # Determine target environment based on branch
          if [[ "$BRANCH_REF" == "main" ]]; then
            TARGET_ENV="main"
          else
            TARGET_ENV="dev"
          fi
          echo "environment=$TARGET_ENV" >> $GITHUB_OUTPUT
          
          # Get modules from artifacts
          MODULES=""
          if [ -d "artifacts" ]; then
            echo "Found artifacts directory, reading module information..."
            for artifact_dir in artifacts/*built-modules*; do
              if [ -d "$artifact_dir" ] && [ -f "$artifact_dir/modules.txt" ]; then
                MODULE=$(cat "$artifact_dir/modules.txt")
                echo "Found module from artifact: $MODULE"
                MODULES="$MODULES $MODULE"
              fi
            done
            MODULES=$(echo "$MODULES" | xargs)  # Trim whitespace
          fi
          
          # If no artifacts found, skip - no modules were actually built
          if [ -z "$MODULES" ]; then
            echo "⚠️  No artifacts found - no modules were built, skipping GitOps update"
            echo "This is expected when parse-commit skips all modules for this workflow"
          fi
          
          echo "Final modules to update: $MODULES"
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repository
        if: steps.changes.outputs.modules != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HermesFlow-GitOps
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops
          ref: main
      
      - name: Pull latest changes with retry
        if: steps.changes.outputs.modules != ''
        run: |
          cd gitops
          echo "Pulling latest changes from main branch with retry..."
          for i in {1..5}; do
            if git pull origin main; then
              echo "✅ Successfully pulled latest changes"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 10 seconds..."
              sleep 10
              if [ $i -eq 5 ]; then
                echo "❌ Failed to pull after 5 attempts"
                exit 1
              fi
            fi
          done

      - name: Install yq
        if: steps.changes.outputs.modules != ''
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags
        if: steps.changes.outputs.modules != ''
        run: |
          cd gitops
          
          # Generate image tag (consistent with CI workflows)
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          BRANCH_NAME_CLEAN=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          NEW_TAG="${BRANCH_NAME_CLEAN}-${SHORT_SHA}"
          
          TARGET_ENV="${{ steps.changes.outputs.environment }}"
          MODULES="${{ steps.changes.outputs.modules }}"
          
          echo "Target environment: $TARGET_ENV"
          echo "New image tag: $NEW_TAG"
          echo "Modules to update: $MODULES"
          
          for MODULE in $MODULES; do
            VALUES_FILE="apps/${TARGET_ENV}/${MODULE}/values.yaml"
            
            if [ -f "$VALUES_FILE" ]; then
              echo "Updating $VALUES_FILE with tag $NEW_TAG"
              
              # Check if file uses hermesflow-microservice base chart
              if yq eval '.hermesflow-microservice' "$VALUES_FILE" | grep -q "image:"; then
                # Update image tag in hermesflow-microservice base chart
                yq eval ".hermesflow-microservice.image.tag = \"$NEW_TAG\"" -i "$VALUES_FILE"
              else
                # Direct image tag (for standalone services)
                yq eval ".image.tag = \"$NEW_TAG\"" -i "$VALUES_FILE"
              fi
              
              echo "✅ Updated $MODULE to $NEW_TAG in $TARGET_ENV environment"
            else
              echo "⚠️ Warning: $VALUES_FILE not found, skipping"
            fi
          done

      - name: Commit and push changes
        if: steps.changes.outputs.modules != ''
        run: |
          cd gitops
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          TARGET_ENV="${{ steps.changes.outputs.environment }}"
          git add apps/${TARGET_ENV}/*/values.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          BRANCH_NAME_CLEAN=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          NEW_TAG="${BRANCH_NAME_CLEAN}-${SHORT_SHA}"
          MODULES="${{ steps.changes.outputs.modules }}"
          
          git commit -m "chore($TARGET_ENV): update $MODULES to $NEW_TAG

          Environment: $TARGET_ENV
          Branch: $BRANCH_NAME
          Triggered by: ${{ github.event.workflow_run.name }}
          Commit: ${{ github.event.workflow_run.head_sha }}
          Author: ${{ github.actor }}"
          
          # Push with retry
          echo "Pushing changes to GitOps repository with retry..."
          for i in {1..5}; do
            if git push origin main; then
              echo "✅ Successfully pushed changes"
              break
            else
              echo "⚠️ Push attempt $i failed, retrying in 10 seconds..."
              sleep 10
              if [ $i -eq 5 ]; then
                echo "❌ Failed to push after 5 attempts"
                exit 1
              fi
            fi
          done

      - name: Notify Slack
        if: false  # Disabled: Slack notification not configured
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            COLOR="good"
            MESSAGE="✅ GitOps repository updated successfully"
          else
            COLOR="danger"
            MESSAGE="❌ Failed to update GitOps repository"
          fi
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Modules\", \"value\": \"${{ steps.changes.outputs.modules }}\", \"short\": true},
                  {\"title\": \"Image Tag\", \"value\": \"${{ github.event.workflow_run.head_sha }}\", \"short\": true}
                ]
              }]
            }"

