name: CI - Python Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  parse-commit:
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.parse.outputs.module }}
      strategy-engine-build: ${{ steps.set-flags.outputs.strategy-engine-build }}
      backtest-engine-build: ${{ steps.set-flags.outputs.backtest-engine-build }}
      risk-engine-build: ${{ steps.set-flags.outputs.risk-engine-build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Parse commit message
        id: parse
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"
          
          if [[ "$COMMIT_MSG" =~ \[module:\ *([a-z-]+)\] ]]; then
            MODULE="${BASH_REMATCH[1]}"
            echo "module=${MODULE}" >> $GITHUB_OUTPUT
            echo "Found module: ${MODULE}"
          else
            echo "module=all" >> $GITHUB_OUTPUT
            echo "No specific module found, will build all modules"
          fi
      
      - name: Set build flags
        id: set-flags
        run: |
          MODULE="${{ steps.parse.outputs.module }}"
          
          # strategy-engine
          if [[ "$MODULE" == "all" ]] || [[ "$MODULE" == "strategy-engine" ]]; then
            echo "strategy-engine-build=true" >> $GITHUB_OUTPUT
          else
            echo "strategy-engine-build=false" >> $GITHUB_OUTPUT
          fi
          
          # backtest-engine
          if [[ "$MODULE" == "all" ]] || [[ "$MODULE" == "backtest-engine" ]]; then
            echo "backtest-engine-build=true" >> $GITHUB_OUTPUT
          else
            echo "backtest-engine-build=false" >> $GITHUB_OUTPUT
          fi
          
          # risk-engine
          if [[ "$MODULE" == "all" ]] || [[ "$MODULE" == "risk-engine" ]]; then
            echo "risk-engine-build=true" >> $GITHUB_OUTPUT
          else
            echo "risk-engine-build=false" >> $GITHUB_OUTPUT
          fi

  build-python:
    needs: parse-commit
    runs-on: ubuntu-latest
    environment: development
    outputs:
      image_tag: ${{ steps.docker_meta.outputs.tags }}
    strategy:
      fail-fast: false
      matrix:
        module:
          - name: strategy-engine
            build: ${{ needs.parse-commit.outputs.strategy-engine-build }}
          - name: backtest-engine
            build: ${{ needs.parse-commit.outputs.backtest-engine-build }}
          - name: risk-engine
            build: ${{ needs.parse-commit.outputs.risk-engine-build }}
    
    if: |
      needs.parse-commit.outputs.strategy-engine-build == 'true' || 
      needs.parse-commit.outputs.backtest-engine-build == 'true' ||
      needs.parse-commit.outputs.risk-engine-build == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: matrix.module.build == 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        if: matrix.module.build == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip packages
        uses: actions/cache@v4
        if: matrix.module.build == 'true'
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: matrix.module.build == 'true'
        working-directory: modules/${{ matrix.module.name }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true
          pip install pytest pytest-cov pylint flake8

      - name: Run flake8
        if: matrix.module.build == 'true'
        working-directory: modules/${{ matrix.module.name }}
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pylint
        if: matrix.module.build == 'true'
        working-directory: modules/${{ matrix.module.name }}
        run: |
          pylint --fail-under=8.0 --rcfile=.pylintrc . || true
          # Don't fail the build on pylint for now

      - name: Run tests with coverage
        if: matrix.module.build == 'true'
        working-directory: modules/${{ matrix.module.name }}
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term --verbose

      - name: Check coverage threshold
        if: matrix.module.build == 'true' && github.event_name != 'pull_request'
        working-directory: modules/${{ matrix.module.name }}
        run: |
          COVERAGE=$(pytest --cov=. --cov-report=term | grep "TOTAL" | awk '{print $4}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below threshold 75%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: matrix.module.build == 'true' && github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: modules/${{ matrix.module.name }}/coverage.xml
          flags: python-${{ matrix.module.name }}
          name: ${{ matrix.module.name }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Extract branch name and generate image tag
        if: matrix.module.build == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        id: docker_meta
        run: |
          BRANCH_NAME=$(echo ${{ github.ref }} | sed 's/refs\/heads\///' | sed 's/\//-/g')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${BRANCH_NAME}-${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Login to Azure Container Registry
        if: matrix.module.build == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        if: matrix.module.build == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        working-directory: modules/${{ matrix.module.name }}
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.module.name }}:${{ steps.docker_meta.outputs.tag }}
          IMAGE_LATEST=${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.module.name }}:latest
          
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "Pushed image: $IMAGE_TAG"
      
      - name: Save built module info
        if: matrix.module.build == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          mkdir -p build-info
          echo "${{ matrix.module.name }}" >> build-info/modules.txt
      
      - name: Upload built modules artifact
        if: matrix.module.build == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@v4
        with:
          name: python-built-modules-${{ matrix.module.name }}
          path: build-info/modules.txt
          retention-days: 1

      - name: Run Trivy security scan
        if: matrix.module.build == 'true' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.module.name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: matrix.module.build == 'true' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: python-${{ matrix.module.name }}

  notify:
    needs: build-python
    runs-on: ubuntu-latest
    if: false  # Disabled: Slack notification not configured
    steps:
      - name: Send Slack notification
        if: false
        run: |
          STATUS="${{ needs.build-python.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            MESSAGE="✅ Python CI passed for commit ${{ github.sha }}"
          else
            COLOR="danger"
            MESSAGE="❌ Python CI failed for commit ${{ github.sha }}"
          fi
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true}
                ]
              }]
            }"

