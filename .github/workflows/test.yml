name: Automated Testing

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # 单元测试
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [data-engine, strategy-engine, trading-engine, user-management, risk-engine]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Test Environment
        run: |
          case "${{ matrix.module }}" in
            data-engine)
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              cargo install cargo-tarpaulin
              ;;
            strategy-engine)
              python -m pip install --upgrade pip
              pip install -r modules/strategy-engine/requirements.txt
              pip install pytest pytest-cov
              ;;
            *)
              java -version
              mvn install -DskipTests
              ;;
          esac
      
      - name: Run Unit Tests
        run: |
          cd modules/${{ matrix.module }}
          case "${{ matrix.module }}" in
            data-engine)
              cargo test --lib
              cargo tarpaulin --out Xml
              ;;
            strategy-engine)
              pytest tests/unit --cov=. --cov-report=xml
              ;;
            *)
              mvn test
              ;;
          esac
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: ${{ matrix.module }}
          name: ${{ matrix.module }}-coverage

  # 安全测试
  security-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hermesflow_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          pip install pytest pytest-cov sqlalchemy redis kafka-python
      
      - name: Run SQL Injection Tests
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/hermesflow_test
        run: pytest tests/security/test_sql_injection.py -v
      
      - name: Run XSS Protection Tests
        run: pytest tests/security/test_xss.py -v
      
      - name: Run Authentication Tests
        run: pytest tests/security/test_authentication.py -v
      
      - name: Run RBAC Tests
        run: pytest tests/security/test_rbac.py -v
      
      - name: Run Multi-tenant Isolation Tests
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/hermesflow_test
          REDIS_URL: redis://localhost:6379
        run: pytest tests/security/test_tenant_isolation.py -v
      
      - name: Fail if Security Tests Failed
        run: |
          if [ $? -ne 0 ]; then
            echo "❌ 安全测试失败，阻止代码合并"
            exit 1
          fi

  # 集成测试
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Start Test Environment
        run: |
          docker-compose -f docker-compose.test.yml up -d
          sleep 30  # 等待服务启动
      
      - name: Run Integration Tests
        run: |
          docker-compose -f docker-compose.test.yml run --rm test-runner
          exit_code=$?
          docker-compose -f docker-compose.test.yml down
          exit $exit_code

  # 性能测试（仅main分支）
  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Run Load Tests
        env:
          API_TOKEN: ${{ secrets.TEST_API_TOKEN }}
        run: k6 run tests/performance/load_test.js
      
      - name: Verify Performance Baselines
        run: python tests/performance/verify_baselines.py

  # 代码质量检查
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于SonarQube
      
      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      
      - name: Security Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
  
  # 测试报告
  test-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, security-tests, integration-tests]
    if: always()
    
    steps:
      - name: Generate Test Report
        run: |
          echo "## 测试执行摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 单元测试: 通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 安全测试: 通过" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 集成测试: 通过" >> $GITHUB_STEP_SUMMARY

