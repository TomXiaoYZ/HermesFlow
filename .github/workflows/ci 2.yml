name: HermesFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # Rust Services (Data Engine, Gateway)
  # ------------------------------------------------------------------
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Data Engine
        run: cd services/data-engine && cargo check
        
      - name: Check Gateway
        run: cd services/gateway && cargo check
        
      - name: Test Data Engine
        run: cd services/data-engine && cargo test
        
      - name: Test Gateway
        run: cd services/gateway && cargo test

  # ------------------------------------------------------------------
  # Python Services (Risk, Strategy)
  # ------------------------------------------------------------------
  python-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e infrastructure/python/hermes_common
          pip install -e services/risk-engine
          pip install -e services/strategy-engine
          
      - name: Lint with Ruff
        run: ruff check infrastructure/python services/risk-engine services/strategy-engine
        
      - name: Type check with MyPy
        run: mypy infrastructure/python services/risk-engine services/strategy-engine
        
      - name: Run Tests
        # Add tests dir when available
        run: pytest services/risk-engine services/strategy-engine

  # ------------------------------------------------------------------
  # Docker Build Verification
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-check, python-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Images
        run: docker compose build
