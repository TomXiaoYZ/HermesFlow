name: Security Scan

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/pom.xml'
      - '**/requirements.txt'
      - '**/package.json'
      - '**/package-lock.json'

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest
    environment: development
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        module:
          - data-engine
          - gateway
          - user-management
          - api-gateway
          - trading-engine
          - strategy-engine
          - backtest-engine
          - risk-engine
          - frontend
    
    steps:
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull latest image
        run: |
          docker pull ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.module }}:latest || echo "Image not found, skipping"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.module }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.module }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.module }}.sarif'
          category: security-scan-${{ matrix.module }}

  dependency-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust dependency audit
        run: |
          cargo install cargo-audit
          
          for dir in modules/data-engine modules/gateway; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "Auditing $dir"
              cd "$dir"
              cargo audit || true
              cd ../..
            fi
          done

      - name: Python dependency audit
        run: |
          pip install safety
          
          for dir in modules/strategy-engine modules/backtest-engine modules/risk-engine; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Auditing $dir"
              safety check --file "$dir/requirements.txt" || true
            fi
          done

      - name: Node.js dependency audit
        run: |
          if [ -f "modules/frontend/package.json" ]; then
            cd modules/frontend
            npm audit --audit-level=high || true
            cd ../..
          fi

      - name: Java dependency check
        run: |
          # Install OWASP Dependency Check CLI
          wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v8.4.0/dependency-check-8.4.0-release.zip
          unzip -q dependency-check-8.4.0-release.zip
          
          for dir in modules/user-management modules/api-gateway modules/trading-engine; do
            if [ -f "$dir/pom.xml" ]; then
              echo "Checking $dir"
              ./dependency-check/bin/dependency-check.sh --project "$dir" --scan "$dir" --format HTML --out reports || true
            fi
          done

  terraform-security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          format: sarif
          soft_fail: true

      - name: Upload tfsec results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: terraform-security

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform
          framework: terraform
          output_format: sarif
          soft_fail: true

  secret-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  notify:
    needs: [trivy-image-scan, dependency-audit, terraform-security, secret-scan]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Calculate overall status
        id: status
        run: |
          TRIVY_STATUS="${{ needs.trivy-image-scan.result }}"
          DEP_AUDIT_STATUS="${{ needs.dependency-audit.result }}"
          TF_SECURITY_STATUS="${{ needs.terraform-security.result }}"
          SECRET_SCAN_STATUS="${{ needs.secret-scan.result }}"
          
          if [[ "$TRIVY_STATUS" == "failure" ]] || [[ "$DEP_AUDIT_STATUS" == "failure" ]] || \
             [[ "$TF_SECURITY_STATUS" == "failure" ]] || [[ "$SECRET_SCAN_STATUS" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "message=❌ Security scan found issues" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "message=✅ All security scans passed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"Daily Security Scan Report\",
              \"attachments\": [{
                \"color\": \"${{ steps.status.outputs.color }}\",
                \"text\": \"${{ steps.status.outputs.message }}\",
                \"fields\": [
                  {\"title\": \"Trivy\", \"value\": \"${{ needs.trivy-image-scan.result }}\", \"short\": true},
                  {\"title\": \"Dependencies\", \"value\": \"${{ needs.dependency-audit.result }}\", \"short\": true},
                  {\"title\": \"Terraform\", \"value\": \"${{ needs.terraform-security.result }}\", \"short\": true},
                  {\"title\": \"Secrets\", \"value\": \"${{ needs.secret-scan.result }}\", \"short\": true}
                ],
                \"footer\": \"View details in GitHub Actions\"
              }]
            }"

