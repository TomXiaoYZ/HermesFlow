name: CI - Frontend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  parse-commit:
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.parse.outputs.module }}
      frontend-build: ${{ steps.set-flags.outputs.frontend-build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Parse commit message
        id: parse
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"
          
          if [[ "$COMMIT_MSG" =~ \[module:\ *([a-z-]+)\] ]]; then
            MODULE="${BASH_REMATCH[1]}"
            echo "module=${MODULE}" >> $GITHUB_OUTPUT
            echo "Found module: ${MODULE}"
          else
            echo "module=all" >> $GITHUB_OUTPUT
            echo "No specific module found, will build all modules"
          fi
      
      - name: Set build flags
        id: set-flags
        run: |
          MODULE="${{ steps.parse.outputs.module }}"
          
          # frontend
          if [[ "$MODULE" == "all" ]] || [[ "$MODULE" == "frontend" ]]; then
            echo "frontend-build=true" >> $GITHUB_OUTPUT
          else
            echo "frontend-build=false" >> $GITHUB_OUTPUT
          fi

  build-frontend:
    needs: parse-commit
    if: needs.parse-commit.outputs.frontend-build == 'true'
    runs-on: ubuntu-latest
    environment: development
    outputs:
      image_tag: ${{ steps.docker_meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: modules/frontend
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: modules/frontend
        run: npm run lint || true

      - name: Run Prettier check
        working-directory: modules/frontend
        run: npm run format:check || true

      - name: Run type check
        working-directory: modules/frontend
        run: npm run type-check || true

      - name: Run tests
        working-directory: modules/frontend
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: modules/frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build production bundle
        working-directory: modules/frontend
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          SKIP_PREFLIGHT_CHECK: true

      - name: Check bundle size
        working-directory: modules/frontend
        run: |
          BUNDLE_SIZE=$(du -sh build | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"

      - name: Extract branch name and generate image tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        id: docker_meta
        run: |
          BRANCH_NAME=$(echo ${{ github.ref }} | sed 's/refs\/heads\///' | sed 's/\//-/g')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${BRANCH_NAME}-${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          
      - name: Login to Azure Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        working-directory: modules/frontend
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ steps.docker_meta.outputs.tag }}
          IMAGE_LATEST=${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "Pushed image: $IMAGE_TAG"
      
      - name: Save built module info
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          mkdir -p build-info
          echo "frontend" >> build-info/modules.txt
      
      - name: Upload built modules artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-built-modules
          path: build-info/modules.txt
          retention-days: 1

      - name: Run Trivy security scan
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: frontend

  notify:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: false  # Disabled: Slack notification not configured
    steps:
      - name: Send Slack notification
        if: false
        run: |
          STATUS="${{ needs.build-frontend.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            MESSAGE="✅ Frontend CI passed for commit ${{ github.sha }}"
          else
            COLOR="danger"
            MESSAGE="❌ Frontend CI failed for commit ${{ github.sha }}"
          fi
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true}
                ]
              }]
            }"

