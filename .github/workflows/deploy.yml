name: Deploy to AWS

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker images
      run: |
        docker build -t $ECR_REGISTRY/trading-engine:$GITHUB_SHA .
        docker push $ECR_REGISTRY/trading-engine:$GITHUB_SHA

    - name: Update kube config
      run: aws eks update-kubeconfig --name trading-platform-cluster --region $AWS_REGION

    - name: Deploy to EKS
      run: |
        # 根据不同的分支/标签部署到不同的环境
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          # Production deployment
          kubectl apply -f environments/prod/k8s/
        else
          # Development deployment
          kubectl apply -f environments/dev/k8s/
        fi 