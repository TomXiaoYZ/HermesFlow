apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hermesflow-dev

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - clickhouse.yaml
  - kafka.yaml
  - monitoring.yaml
  - elk.yaml

commonLabels:
  app.kubernetes.io/name: hermesflow
  app.kubernetes.io/instance: dev
  app.kubernetes.io/part-of: hermesflow
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: hermesflow-config
    literals:
      - APP_ENV=development
      - LOG_LEVEL=debug 