global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'discord-critical'
  routes:
    - match:
        severity: critical
      receiver: 'discord-critical'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'discord-warning'
      repeat_interval: 4h
    - match:
        severity: info
      receiver: 'discord-info'
      repeat_interval: 12h

receivers:
  - name: 'discord-critical'
    webhook_configs:
      - url: 'http://alertmanager-discord:9094'
        send_resolved: true
  - name: 'discord-warning'
    webhook_configs:
      - url: 'http://alertmanager-discord:9094'
        send_resolved: true
  - name: 'discord-info'
    webhook_configs:
      - url: 'http://alertmanager-discord:9094'
        send_resolved: false

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
