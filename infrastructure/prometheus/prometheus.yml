global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'data-engine'
    scrape_interval: 10s
    static_configs:
      - targets: ['data-engine:8080']
    metrics_path: '/metrics'

  - job_name: 'gateway'
    scrape_interval: 15s
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/metrics'

  - job_name: 'strategy-engine'
    scrape_interval: 15s
    static_configs:
      - targets: ['strategy-engine:8082']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
