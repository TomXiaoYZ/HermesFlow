groups:
  # ── CRITICAL: Immediate attention required ────────────────────────
  - name: critical_data_integrity
    interval: 30s
    rules:
      - alert: DataEngineDown
        expr: data_engine_service_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Data Engine is DOWN"
          description: "data_engine_service_up has been 0 for over 1 minute."

      - alert: MajorDataStaleness
        expr: data_engine_dq_stale_symbols > (data_engine_active_symbols_count * 0.5)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Over 50% of symbols have stale data"
          description: "{{ $value }} symbols are stale."

      - alert: DeadLetterSpike
        expr: rate(data_engine_dead_letter_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Dead letter records accumulating"
          description: "Data permanently dropped at {{ $value | humanize }}/s."

      - alert: HighErrorRate
        expr: rate(data_engine_errors_total[5m]) > 1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High error rate in data engine"
          description: "Error rate: {{ $value | humanize }}/s"

  # ── WARNING: Investigate soon ─────────────────────────────────────
  - name: warning_data_quality
    interval: 60s
    rules:
      - alert: DataGapsDetected
        expr: data_engine_dq_gap_symbols > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Multiple symbols with data gaps"
          description: "{{ $value }} symbols have missing candles."

      - alert: PriceSpikesDetected
        expr: data_engine_dq_spike_symbols > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Multiple price spike anomalies"
          description: "{{ $value }} symbols with >50% price movement in 10min."

      - alert: CrossSourceDivergence
        expr: data_engine_dq_cross_source_divergence > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cross-source price divergence detected"
          description: "{{ $value }} symbols have >1% price difference across exchanges."

      - alert: HighIngestLatency
        expr: histogram_quantile(0.95, rate(data_engine_ingest_latency_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High data ingest latency"
          description: "P95 ingest latency is {{ $value | humanize }}s."

      - alert: ValidationFailureSpike
        expr: rate(data_engine_validation_failures_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High validation failure rate"
          description: "{{ $value | humanize }} invalid records/s being rejected."

      - alert: TimestampDrift
        expr: data_engine_dq_timestamp_drift_symbols > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Timestamp drift detected"
          description: "{{ $value }} symbols with excessive exchange-to-system timestamp drift."

  # ── WATCHLIST: Completeness monitoring ────────────────────────────
  - name: watchlist_completeness
    interval: 60s
    rules:
      - alert: WatchlistDataMissing
        expr: data_engine_dq_watchlist_missing_symbols > 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Watchlist symbols with NO candle data"
          description: "{{ $value }} watchlist symbols have zero candle data — data pipeline not reaching them."

      - alert: WatchlistDataStale
        expr: data_engine_dq_watchlist_stale_symbols > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Watchlist symbols with stale candle data"
          description: "{{ $value }} watchlist symbols have candle data older than 4 days."

      - alert: PolygonSyncFailureRate
        expr: rate(data_engine_polygon_sync_failures_total[30m]) > 0.01
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Polygon sync failure rate elevated"
          description: "Polygon {{ $labels.resolution }} sync failures at {{ $value | humanize }}/s."

  # ── INFO: Routine monitoring ──────────────────────────────────────
  - name: info_monitoring
    interval: 300s
    rules:
      - alert: SourceQualityDegraded
        expr: data_engine_dq_source_score < 0.7
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Data source quality below threshold"
          description: "Source {{ $labels.source }} quality score: {{ $value | humanize }}"

      - alert: LowLiquidityTokens
        expr: data_engine_dq_low_liq_symbols > 5
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Multiple low-liquidity tokens active"
          description: "{{ $value }} tokens below liquidity threshold."

      - alert: VolumeAnomaly
        expr: data_engine_dq_volume_anomaly > 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Volume anomaly detected"
          description: "{{ $value }} symbols with abnormal trading volume."

  # ── GATEWAY: Proxy & WebSocket alerts ──────────────────────────────
  - name: gateway_alerts
    interval: 30s
    rules:
      - alert: GatewayHighErrorRate
        expr: rate(gateway_proxy_errors_total[5m]) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Gateway proxy error rate elevated"
          description: "Proxy errors at {{ $value | humanize }}/s for target {{ $labels.target }}."

      - alert: WebSocketConnectionDrop
        expr: delta(gateway_websocket_connections[5m]) < -10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Sudden WebSocket connection drop"
          description: "{{ $value | humanize }} WebSocket connections lost in 5 minutes."

      - alert: GatewayHighLatency
        expr: histogram_quantile(0.95, rate(gateway_upstream_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Gateway upstream latency high"
          description: "P95 proxy latency to {{ $labels.target }} is {{ $value | humanize }}s."

      - alert: GatewayUpstreamDown
        expr: gateway_upstream_health == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Gateway upstream service unreachable"
          description: "Upstream {{ $labels.target }} has been down for over 2 minutes."

  # ── STRATEGY ENGINE: Signal & Risk alerts ──────────────────────────
  - name: strategy_engine_alerts
    interval: 30s
    rules:
      - alert: StrategyEngineDown
        expr: service_up{job="strategy-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Strategy Engine is DOWN"
          description: "Strategy engine service_up has been 0 for over 1 minute."

      - alert: RiskRejectionSpike
        expr: rate(strategy_risk_checks_total{result="rejected"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Risk rejection rate elevated"
          description: "Risk rejections at {{ $value | humanize }}/s."

      - alert: MarketDataLagHigh
        expr: histogram_quantile(0.95, rate(strategy_market_data_lag_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Strategy engine market data lag high"
          description: "P95 market data lag is {{ $value | humanize }}s."

      - alert: NoMarketDataConsumed
        expr: rate(strategy_market_data_consumed_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Strategy engine receiving no market data"
          description: "No market data consumed in the last 5 minutes."

  # ── CIRCUIT BREAKER & TASK alerts ──────────────────────────────────
  - name: resilience_alerts
    interval: 30s
    rules:
      - alert: CircuitBreakerOpen
        expr: data_engine_circuit_breaker_state > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open for {{ $labels.source }}"
          description: "Source {{ $labels.source }} circuit breaker state: {{ $value }} (1=open, 2=half-open)."

      - alert: TaskTimeoutSpike
        expr: rate(data_engine_task_timeout_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Scheduled task timeouts detected"
          description: "Task {{ $labels.task }} is timing out."

      - alert: E2EFreshnessStale
        expr: data_engine_e2e_freshness_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Data freshness stale for {{ $labels.source }}"
          description: "Source {{ $labels.source }} data is {{ $value | humanize }}s old."

      - alert: DQIncidentRate
        expr: rate(data_engine_dq_incidents_total[10m]) > 0.05
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Data quality incidents accumulating"
          description: "DQ incidents ({{ $labels.check_type }}/{{ $labels.severity }}) at {{ $value | humanize }}/s."
